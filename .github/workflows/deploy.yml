name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build web to docs folder
        run: flutter build web --base-href /showcase/ --release --output=docs/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-docs
          path: docs/



